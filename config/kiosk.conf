# kiosk-manager configuration
#
# SECURITY: this is a privileged, trusted file. 'chromium', 'user_data_dir' and
# 'extra_flags' become the Chromium command line verbatim, so it should stay
# owned by the kiosk user and not be world-writable (install.sh sets 0600).
#
# Settings are "key = value". Dashboards are "Name | URL" (one per line).
# Lines starting with # are comments. Reload at runtime with: kiosk-manager -reload
# (note: changing 'port' needs a service restart, not -reload).

# Localhost port the service listens on (Chromium points here).
port = 8787

# How dashboards are kept ready for instant switching:
#   all        every dashboard stays loaded (fastest switch, most RAM)
#   window:1   only current +/- 1 kept loaded, others load on first visit
preload = all

# How inactive dashboards are hidden:
#   visibility  laid out but not painted (lower GPU load) — recommended
#   opacity     kept painted (zero-cost flip, higher continuous GPU load)
visual = visibility

# Chromium executable (resolved via PATH). Older Raspberry Pi OS uses "chromium-browser".
chromium = chromium

# Dedicated Chromium profile (required separate from your normal one).
user_data_dir = /var/lib/kiosk-manager/profile

# Extra Chromium flags appended verbatim (space-separated). Examples:
#   Wayland:  extra_flags = --ozone-platform=wayland
#   Hide cursor / GPU tuning, etc.
# extra_flags =

# --- Dashboards ---  (order defines -page numbers and -next/-prev cycling)
Solar     | https://grafana.example.com/public-dashboards/REPLACE_WITH_YOUR_DASHBOARD_ID
# Network | https://grafana.example.com/public-dashboards/REPLACE_WITH_YOUR_DASHBOARD_ID
# Power   | https://grafana.example.com/public-dashboards/REPLACE_WITH_YOUR_DASHBOARD_ID
